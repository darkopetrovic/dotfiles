#cloud-config

users:
  - name: ubuntu
    groups: [sudo, adm]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"

package_update: true
package_upgrade: false

packages:
  - git
  - curl

runcmd:
  # run setup.sh as the ubuntu user (Option B — no repo clone needed)
  - su - ubuntu -c "bash <(curl -fsSL https://raw.githubusercontent.com/darkopetrovic/dotfiles/main/setup.sh)"

final_message: "Development environment ready."
