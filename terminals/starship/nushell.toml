"$schema" = 'https://starship.rs/config-schema.json'

# Two-line powerline prompt — Catppuccin Mocha + Nerd Fonts
# Line 1: OS userdirectorygitlanguages ──fill── duration
# Line 2: ❯                                                                  time (right)

format = """
[](fg:mauve)\
$os\
$username\
$hostname\
[](bg:blue fg:mauve)\
$directory\
[](bg:yellow fg:blue)\
$git_branch\
$git_status\
[](bg:teal fg:yellow)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$python\
[](fg:teal)\
$fill\
$shell\
$cmd_duration\
$line_break\
$character"""

right_format = """$time"""

palette = 'catppuccin_mocha'

[fill]
symbol = ' '

[os]
disabled = false
style = "bg:mauve fg:base"

[os.symbols]
Windows = " "
Ubuntu = "󰕈 "
Linux = "󰐿 "
Debian = "󰣭 "
Arch = "󰌒 "
Fedora = "󰀵 "
Raspbian = "󰂹 "

[username]
show_always = true
style_user = "bg:mauve fg:user_color"
style_root = "bg:mauve fg:base bold"
format = '[ $user]($style)'

[hostname]
ssh_only = false
style = "bg:mauve fg:base"
format = '[@$hostname ]($style)'

[shell]
disabled = false
bash_indicator = 'bash'
fish_indicator = 'fish'
zsh_indicator = 'zsh'
nu_indicator = 'nu'
unknown_indicator = '?'
style = "fg:overlay1"
format = '[$indicator ]($style)'

[directory]
style = "bg:blue fg:base"
format = '[ 󰋜 $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = "󰇚"
"Music" = "󰝚"
"Pictures" = "󰏩"
"Developer" = "󰯣"

[git_branch]
symbol = " "
style = "bg:yellow fg:base"
format = '[[ $symbol$branch ](fg:base bg:yellow)]($style)'

[git_status]
style = "bg:yellow fg:base"
format = '[[($all_status$ahead_behind )](fg:base bg:yellow)]($style)'

[nodejs]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version ](fg:base bg:teal)]($style)'

[bun]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version ](fg:base bg:teal)]($style)'

[rust]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version ](fg:base bg:teal)]($style)'

[golang]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version ](fg:base bg:teal)]($style)'

[python]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version(\($virtualenv\)) ](fg:base bg:teal)]($style)'

[c]
symbol = " "
style = "bg:teal fg:base"
format = '[[ $symbol$version ](fg:base bg:teal)]($style)'

[cmd_duration]
min_time = 500
show_milliseconds = false
style = "fg:overlay1"
format = '[ $duration ]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "fg:overlay1"
format = '[  $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:mauve)'
vimcmd_replace_one_symbol = '[❮](bold fg:peach)'
vimcmd_replace_symbol = '[❮](bold fg:peach)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
user_color = "#af1b9b"
