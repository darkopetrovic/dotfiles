"$schema" = 'https://starship.rs/config-schema.json'

# Windows Terminal / terminals without Nerd Font support
# Uses ASCII separators and text labels instead of icons

format = """
[$username](bold fg:red)\
$hostname\
[ | ](dimmed)\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$python\
$shell\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_frappe'

[os]
disabled = true

[username]
show_always = true
style_user = "bold fg:red"
style_root = "bold fg:red"
format = '[$user]($style)'

[hostname]
ssh_only = false
style = "bold fg:red"
format = '[@$hostname]($style)'

[shell]
disabled = false
bash_indicator = 'bash'
fish_indicator = 'fish'
zsh_indicator = 'zsh'
nu_indicator = 'nu'
unknown_indicator = '?'
style = "dimmed"
format = '[ $indicator]($style)'

[directory]
style = "fg:peach"
format = "[$path ](bold $style)"
truncation_length = 3
truncation_symbol = ".../"

[directory.substitutions]
"Documents" = "docs"
"Downloads" = "dl"
"Music" = "music"
"Pictures" = "pics"

[git_branch]
symbol = "git:"
style = "fg:yellow"
format = '[| $symbol $branch ]($style)'

[git_status]
style = "fg:yellow"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = "node"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[bun]
symbol = "bun"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[c]
symbol = "c"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[rust]
symbol = "rs"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[golang]
symbol = "go"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[php]
symbol = "php"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[java]
symbol = "java"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[kotlin]
symbol = "kt"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[haskell]
symbol = "hs"
style = "fg:green"
format = '[$symbol:$version ]($style)'

[python]
symbol = "py"
style = "fg:green"
format = '[$symbol:$version(\($virtualenv\)) ]($style)'

[conda]
disabled = true

[docker_context]
disabled = true

[time]
disabled = false
time_format = "%R"
style = "fg:lavender"
format = '[| $time ]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[>](bold fg:green)'
error_symbol = '[>](bold fg:red)'
vimcmd_symbol = '[<](bold fg:green)'
vimcmd_replace_one_symbol = '[<](bold fg:lavender)'
vimcmd_replace_symbol = '[<](bold fg:lavender)'
vimcmd_visual_symbol = '[<](bold fg:yellow)'

[cmd_duration]
show_milliseconds = false
format = "[| $duration ]($style)"
style = "fg:lavender"
disabled = false
show_notifications = false
min_time = 2000

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"
